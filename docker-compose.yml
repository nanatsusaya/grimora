# Local Grimora stack — **development only**, offline-first without any cloud (audit F-23, #196).
# Usage: docker compose up -d
#
# Two hardening choices below (dev-only, but they matter on a shared/remote-dev host):
#   - **Pinned images** (specific tags, not `latest`) so a rebuild is reproducible and can't silently pull a
#     new major. Bump these deliberately, like any dependency.
#   - **Host bindings restricted to 127.0.0.1** so these dev services (and their dev credentials) are reachable
#     only from localhost, never from other machines on the network.
services:
  postgres:
    image: postgres:16-alpine
    container_name: grimora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grimora
      POSTGRES_PASSWORD: grimora
      POSTGRES_DB: grimora
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grimora"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: grimora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: grimora
      MINIO_ROOT_PASSWORD: grimora-dev-secret
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Web console
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Self-hosted AuthPort adapter target (ADR 0009 §3): GoTrue is the same Auth technology as
  # Supabase Cloud, run locally against the postgres service above. Manages its own `auth` schema
  # (auto-migrated on first boot). Dev-only settings below (autoconfirm, static JWT secret) must
  # never be reused for a real deployment.
  gotrue:
    image: supabase/gotrue:v2.189.0
    container_name: grimora-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://grimora:grimora@postgres:5432/grimora?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: grimora-dev-jwt-secret-change-me
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true" # local dev only: skip email confirmation, no SMTP needed
    ports:
      - "127.0.0.1:9999:9999" # Auth API

  # Optional: local LLM for the AI chat (fully offline, no API key).
  # Enable with: docker compose --profile ai up -d
  ollama:
    image: ollama/ollama:0.31.2
    container_name: grimora-ollama
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./.docker-data/ollama:/root/.ollama
