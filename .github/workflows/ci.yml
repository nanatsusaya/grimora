name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening — a moved tag cannot
      # silently change what runs); the trailing comment tracks the human-readable version.
      # Dependabot (github-actions ecosystem) keeps these SHAs updated.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pinned to a concrete version, not `latest` — reproducible CI that matches the
          # frozen-lockfile discipline (a new bun release cannot break the pipeline unbidden).
          # Bump deliberately (see docs/recurring-tasks.md), not implicitly.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Architecture conformance
        run: bun run arch

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      # Browser E2E (ADR 0017's Playwright layer, unblocked once apps/web existed). Runs *after* Build
      # because the Playwright webServer is a Vite dev server that resolves the workspace packages from
      # their built `dist`. `--with-deps` installs the chromium OS libraries the runner lacks; only chromium
      # is installed (the projects use it exclusively) to keep the extra CI time small. The specs live in
      # `apps/web/e2e` and are not part of `bun run test` (that is bun's unit layer), so this is their gate.
      - name: E2E (Playwright, apps/web)
        working-directory: apps/web
        run: |
          bunx playwright install --with-deps chromium
          bun run e2e
